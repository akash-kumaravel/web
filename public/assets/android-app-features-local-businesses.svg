    <g transform="translate(428 0)"><rect width="188" height="64" rx="18" fill="#0F2746" stroke="#22D3EE" stroke-opacity="0.45"/><circle cx="32" cy="32" r="13" fill="#22D3EE"/><text x="58" y="40" font-size="22" fill="#E5F7FF">Reports</text></g>
    <g transform="translate(0 86)"><rect width="258" height="64" rx="18" fill="#0F2746" stroke="#22D3EE" stroke-opacity="0.45"/><circle cx="32" cy="32" r="13" fill="#22D3EE"/><text x="58" y="40" font-size="22" fill="#E5F7FF">Push Notifications</text></g>
