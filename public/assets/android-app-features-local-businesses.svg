<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Android App Features for Local Businesses</title>
  <desc id="desc">Dark cyan technology style thumbnail showing app feature cards, mobile UI wireframes, automation nodes, and headline text. No company logo.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#0B86FF" stop-opacity="0.36"/>
      <stop offset="45%" stop-color="#052B52" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#007BFF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F2746" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#07111F" stop-opacity="0.94"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.72 0 0 0 0 0.95 0 0 0 0.8 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#020617"/>
  <rect width="1280" height="720" fill="url(#bgGlow)"/>
  <g opacity="0.2" stroke="#22D3EE" stroke-width="1">
