    <path d="M110 0V720M220 0V720M330 0V720M440 0V720M550 0V720M660 0V720M770 0V720M880 0V720M990 0V720M1100 0V720M1210 0V720"/>
  </g>
  <circle cx="1010" cy="156" r="118" fill="#22D3EE" opacity="0.13" filter="url(#softGlow)"/>
  <circle cx="170" cy="600" r="145" fill="#007BFF" opacity="0.16" filter="url(#softGlow)"/>

  <g transform="translate(810 92)">
