    <rect x="52" y="150" width="182" height="62" rx="18" fill="#0F2746" stroke="#22D3EE" stroke-opacity="0.42"/>
    <rect x="52" y="232" width="82" height="78" rx="18" fill="#071B2F" stroke="#22D3EE" stroke-opacity="0.38"/>
