    <rect x="52" y="330" width="182" height="44" rx="16" fill="#0F2746" stroke="#22D3EE" stroke-opacity="0.42"/>
    <rect x="52" y="398" width="182" height="44" rx="16" fill="#0F2746" stroke="#22D3EE" stroke-opacity="0.42"/>
